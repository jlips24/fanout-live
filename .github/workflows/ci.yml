name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Install development dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Lint
        run: |
          python -m isort --check-only remote_multistreamer tests
          python -m flake8 remote_multistreamer tests

      - name: Run tests with coverage
        run: |
          python -m coverage run -m unittest discover -s tests
          python -m coverage report

      - name: Compile Python sources
        run: python -m compileall remote_multistreamer tests

      - name: Validate Docker Compose config
        env:
          FANOUT_LIVE_TAG: ci
        run: docker compose config
