load_module modules/ngx_rtmp_module.so;

# Keep RTMP publish/play state in one worker. nginx-rtmp live streams are worker-local
# unless auto-push is configured, and Fanout Live only supports one active source.
worker_processes 1;
error_log /config/logs/nginx-error.log info;

events {
    worker_connections 1024;
}

rtmp {
    access_log /config/logs/nginx-rtmp-access.log;

    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;
            # Do not let the fanout reader see an audio-only stream while it is
            # waiting for the publisher's first video keyframe. FFmpeg requires
            # video for every supported pipeline and would otherwise fail its
            # required `-map 0:v:0` during startup.
            wait_video on;
            wait_key on;
            allow publish all;
            allow play all;

            on_publish http://127.0.0.1:8080/api/rtmp/publish;
            on_publish_done http://127.0.0.1:8080/api/rtmp/publish_done;
        }
    }
}
