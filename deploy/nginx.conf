load_module modules/ngx_rtmp_module.so;

# Keep RTMP publish/play state in one worker. nginx-rtmp live streams are worker-local
# unless auto-push is configured, and Fanout Live only supports one active source.
worker_processes 1;
error_log /config/logs/nginx-error.log info;

events {
    worker_connections 1024;
}

rtmp {
    access_log /config/logs/nginx-rtmp-access.log;

    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;
            allow publish all;
            allow play all;

            on_publish http://127.0.0.1:8080/api/rtmp/publish;
            on_publish_done http://127.0.0.1:8080/api/rtmp/publish_done;
        }
    }
}
